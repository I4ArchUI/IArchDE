# Font configuration
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size 10.0

# Window settings
background_opacity 0.9
window_padding_width 5
window_padding_height 5

# Color scheme (Catppuccin Latte)
foreground       #4c4f69
background       #eff1f5

# Normal colors
color0          #5c5f77
color1          #d20f39
color2          #40a02b
color3          #df8e1d
color4          #1e66f5
color5          #ea76cb
color6          #179299
color7          #acb0be

# Bright colors
color8          #6c6f85
color9          #d20f39
color10         #40a02b
color11         #df8e1d
color12         #1e66f5
color13         #ea76cb
color14         #179299
color15         #bcc0cc

# Extended colors (Preserving logical mapping as best as possible, or using valid Latte colors)
color16         #dd7878
color17         #d20f39
color18         #e6e9ef
color19         #dce0e8
color20         #9ca0b0
color21         #4c4f69

# Cursor colors
cursor          #dc8a78
cursor_text_color #eff1f5

# Keyboard shortcuts
map ctrl+equal    change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0

# Disable Ctrl+Q to avoid conflict with Neovim
map ctrl+q no_op
map ctrl+shift+q no_op

# Terminal config
term xterm-kitty

# Animation settings
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# Cursor settings
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Scrollback and performance
scrollback_lines 10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0
input_delay 3
repaint_delay 10
sync_to_monitor yes

# Window transition
window_resize_step_cells 2
window_resize_step_lines 2
placement_strategy center

# Tab management
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# Tab colors
active_tab_foreground   #eff1f5
active_tab_background   #1e66f5
active_tab_font_style   bold
inactive_tab_foreground #4c4f69
inactive_tab_background #e6e9ef
inactive_tab_font_style normal

# Tab bar background
tab_bar_background #eff1f5

# Tab bar edge
tab_bar_margin_width 0
tab_bar_margin_height 0 0

# Tab shortcuts
map ctrl+n new_tab
map ctrl+w close_tab
map ctrl+. next_tab
map ctrl+, previous_tab

# Đánh số tab từ 1
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# Disable confirmation when closing
confirm_os_window_close 0
