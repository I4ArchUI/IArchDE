# Custom keybinds
# Auto-generated by Settings
bind = SUPER, N, exec, obsidian
bind = SUPER, L, exec, pidof hyprlock || hyprlock
bind = SUPER, Delete, exit
bind = SUPER, T, exec, kitty
bind = SUPER, E, exec, kitty -e spf
bind = SUPER, D, exec, vesktop
bind = SUPER, C, exec, code
bind = SUPER, F, exec, opera
bind = SUPER, F1, exec, github-desktop
bind = SUPER, Escape, exec, kitty -e sh -c "btop"
bind = SUPER, F5, exec, pkill waybar && hyprctl dispatch exec waybar
bind = SUPER, R, exec, pkill waybar && hyprctl dispatch exec waybar
bind = SUPER, SUPER_L, exec, ~/.config/hypr/scripts/dashboard.sh
bind = SUPER, SPACE, exec, pkill -x i4archmenu || i4archmenu
bind = SUPER, I, exec, pkill -x i4archsettings || i4archsettings
bind = ALT, F4, killactive
bind = SUPER, Q, killactive
bind = SUPER, W, togglefloating
bind = SUPER, P, pseudo
bind = SUPER, J, togglesplit
bind = SUPER, Return, fullscreen
bind = SUPER SHIFT, S, exec, grimblast --freeze copysave area "/tmp/screenshot.png" && swappy -f "/tmp/screenshot.png" && rm "/tmp/screenshot.png"
bind = ALT, code:212, killactive
bind = SUPER, code:232, exec, github-desktop
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER, tab, workspace, e+1
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
binde = SUPER SHIFT, right, resizeactive, 20 0
binde = SUPER SHIFT, left, resizeactive, -20 0
binde = SUPER SHIFT, up, resizeactive, 0 -20
binde = SUPER SHIFT, down, resizeactive, 0 20
bind = SUPER ALT, right, moveactive, 20 0
bind = SUPER ALT, left, moveactive, -20 0
bind = SUPER ALT, up, moveactive, 0 -20
bind = SUPER ALT, down, moveactive, 0 20
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
