##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Global fixes --------------------------------------------------

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false

    no_focus = true
}

# --- Launchers / Menus --------------------------------------------

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    float = yes
    move  = 20 monitor_h-120
}

windowrule {
    name = menu
		match:class = ^i4archmenu$
    float       = true
    rounding    = 5
    border_size = 1
}

windowrule {
    name = settings
    match:class = ^i4archsettings$
    float       = true
	border_size = 0
}


windowrule {
	name = dashboard
    match:class = ^i4archdashboard$
    float             = true
    move              = 5 40
    rounding          = 10
	decorate          = false
    border_size       = 0
}

# --- Applications (opacity & layout) ------------------------------

windowrule {
    name = code-opacity
    match:class = ^code$
    opacity = 0.95 0.85
}

windowrule {
    name = antigravity-opacity
    match:class = ^Antigravity$
	opacity = 0.95 0.85
}

windowrule {
    name = kitty-opacity
	match:class = ^kitty$
    opacity = 0.9 0.7
	
}

windowrule {
	name = nautilus-config
    match:class = ^org.gnome.Nautilus$
    float       = true
    center      = true
    size        = 1200 850
	opacity     = 0.9 0.8
    border_size = 0
}

windowrule {
    name = zenity-config
    match:class = ^zenity$
    float       = true
    center      = true
    size        = 1200 850
    opacity     = 0.9
    border_size = 0
}

windowrule {
    name = mpv-float
    match:class = ^mpv$
    float = true
    size  = 1100 620
}

windowrule {
    name = openfile-float
    match:title = ^Open File$
    float = true
    size  = 1000 750
    center = true
}

windowrule {
    name = update-float
    match:title = ^update-system$
    float = true
    size  = 1000 750
    center = true
}
