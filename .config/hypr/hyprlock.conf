source = $HOME/.cache/wal/colors-hyprland.conf

background {
    monitor =
    path = $HOME/.config/hypr/themes/background.png 
    blur_size = 5
    blur_passes = 3 
	noise = 0.02
	contrast = 0.5
    brightness = 0.5
    vibrancy = 0.2100
    vibrancy_darkness = 0
}

label {
    monitor =
    text = cmd[update:5000] echo "<b><big> $(date +"%H") </big></b>"
	color = $color6
    font_size = 130
    font_family = Geist Mono 10
    shadow_passes = 3
	shadow_size = 5

    position = 0, 255
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
	color = $color6
    font_size = 130
    font_family = Geist Mono 10
    shadow_passes = 3
	shadow_size = 5

    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<big> "$(date +'%A - %d %b')" </big>"
	color = $color7
    font_size = 18
    font_family = Geist Mono 10

	position = 0, -20
	halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "<b>$(~/.config/hypr/scripts/playerctl.sh title)</b>"
	color = $color7
    font_size = 10
    font_family = Geist Mono 10
	position = 20, 30

	halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo -e $(~/.config/hypr/scripts/playerctl.sh artist)
	color = $color7
    font_size = 8
    font_family = Geist Mono 10
	position = 20, 10

	halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:0] echo "Hi! $USER"
	color = $color6
    font_size = 20
    font_family = JetBrainsMono Nerd Font 10
    shadow_passes = 3
	shadow_size = 4

    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:0] echo "  $LAYOUT"
	color = $color6
    font_size = 8
    font_family = JetBrainsMono Nerd Font 10
    position = 0, 10
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3

	dots_size = 0.26 
    dots_spacing = 0.64
    dots_center = true
    dots_rouding = -1

	rounding = 22
    outer_color = $color0
    inner_color = $color0
    font_color = $color6
	fade_on_empty = false
	placeholder_text = <i>Password...</i>

    position = 0, 40
    halign = center
	valign = bottom
}